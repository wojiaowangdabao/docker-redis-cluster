  create-cluster:
    container_name: create-redis-cluster
    image: redis:7
    command: bash -c "sleep 5 && redis-cli --cluster create redis1:6379 redis2:6379 redis3:6379 redis4:6379 redis5:6379 redis6:6379 --cluster-replicas 1 --cluster-yes -a ${REDIS_PASSWORD}"
    networks:
      - redis-cluster
    depends_on:
      redis1:
        condition: service_healthy
      redis2:
        condition: service_healthy
      redis3:
        condition: service_healthy
      redis4:
        condition: service_healthy
      redis5:
        condition: service_healthy
      redis6:
        condition: service_healthy
    restart: on-failure
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}