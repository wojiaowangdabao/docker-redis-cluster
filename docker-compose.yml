version: '3'

networks:
  redis-cluster:
    driver: bridge

# 定义公共参数
x-redis-common: &redis-common
  image: redis:7
  networks:
    - redis-cluster
  deploy:
      resources:
        limits:
          cpus: '0.05'
          memory: 64M

services:
  redis1:
    container_name: redis-1
    ports:
      - "7001:6379"
      - "17001:16379"
    volumes:
      - ./redis-data/7001:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "redis-1", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 3s
      retries: 5
      start_period: 2s
      timeout: 3s
    command: >
      redis-server
      --cluster-enabled yes
      --cluster-config-file nodes.conf
      --cluster-node-timeout 5000
      --cluster-announce-ip ${IPV4}
      --cluster-announce-port 7001
      --cluster-announce-bus-port 17001
      --cluster-replica-no-failover yes
      --appendonly yes
      --save 300 1000
      --save 60 10000
      --requirepass ${REDIS_PASSWORD}
      --masterauth ${REDIS_PASSWORD}
      --maxmemory 64m
      --maxmemory-policy allkeys-lru
      --protected-mode no
      --bind 0.0.0.0
    <<: *redis-common

  redis2:
    container_name: redis-2
    ports:
      - "7002:6379"
      - "17002:16379"
    volumes: 
      - ./redis-data/7002:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-h", "redis-2", "-a", "${REDIS_PASSWORD}", "ping"]
